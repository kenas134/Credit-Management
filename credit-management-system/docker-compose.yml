version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: credit_mgmt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: credit_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credit_mgmt_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/credit_management_db
      JWT_SECRET: dev_jwt_secret_change_in_production_32chars
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production_32chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             npm run dev"

  # ── Prisma Studio (optional visual DB browser) ───────────────────────────────
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credit_mgmt_studio
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/credit_management_db
    ports:
      - "5555:5555"
    command: npx prisma studio --port 5555 --browser none
    profiles:
      - studio

volumes:
  postgres_data:
